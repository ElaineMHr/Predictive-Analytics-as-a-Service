services:
  frontend:
    build:
      context: .
      dockerfile: DockerfileFrontend
      args:
        VITE_API_URL: http://localhost:42000
        VITE_PROGRESS_MODE: poll
    ports:
      - "3000:3000"
    restart: "unless-stopped"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - uploads:/tmp/uploads
      - models:/tmp/models
    environment:
      APP_MODE: portfolio
      DATABASE_URL: postgresql://dev:dev@postgres:5432/paas_dev
      MODEL_BASE_PATH: /tmp/models
      UPLOAD_DIR: /tmp/uploads
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      SEED_TEST_DATA: "false"
    ports:
      - "42000:8000"
    restart: "unless-stopped"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: paas_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

